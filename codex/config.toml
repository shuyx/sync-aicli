model_provider = "crs"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
disable_response_storage = true
preferred_auth_method = "apikey"

[model_providers.crs]
name = "crs"
base_url = "https://codex.funai.vip/openai/v1"
wire_api = "responses"
requires_openai_auth = true
env_key = "CRS_OAI_KEY"

[models.gpt-5.2]
id = "gpt-5.2"
name = "GPT 5.2"

[models.gpt-5.2-codex]
id = "gpt-5.2-codex"
name = "GPT 5.2 Codex"

[models.gpt-5.3-codex]
id = "gpt-5.3-codex"
name = "GPT 5.3 Codex"

[projects."HOME_PATH"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/商业孵化"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/祥承电子"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/商业孵化/【0】脑机接口"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/商业孵化/【2】无人机"]
trust_level = "trusted"

[projects."HOME_PATH/Obsidian/githubx"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/商业孵化/【10】矿山自动化"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/论文写作/【2】复旦 Emba 项目/顾总｜美特斯邦威"]
trust_level = "trusted"

[projects."OBSIDIAN_PATH/论文写作/【2】复旦 Emba 项目/顾总｜美特斯邦威/4）thesis"]
trust_level = "trusted"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.playwright]
type = "stdio"
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.filesystem]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "HOME_PATH/Documents/【3】Obsidian/Obsidian Work"]

[mcp_servers.fetch]
type = "stdio"
command = "uvx"
args = ["mcp-server-fetch"]

[mcp_servers.context7]
type = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.obsidian]
command = "npx"
args = ["-y", "mcp-obsidian", "HOME_PATH/Documents/【3】Obsidian/Obsidian Work"]

[mcp_servers.deepwiki]
url = "https://mcp.deepwiki.com/mcp"

[mcp_servers.github]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp_servers.github.env]
GITHUB_TOKEN = "YOUR_GITHUB_PAT"

[mcp_servers.git]
type = "stdio"
command = "uvx"
args = ["mcp-server-git"]

[mcp_servers.ripgrep]
type = "stdio"
command = "npx"
args = ["-y", "mcp-ripgrep@latest"]

[mcp_servers.sequential-thinking]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.memory]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.time]
type = "stdio"
command = "HOME_PATH/.local/share/mcp-time/node_modules/.bin/mcp-time-server"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.2" = "gpt-5.4"

