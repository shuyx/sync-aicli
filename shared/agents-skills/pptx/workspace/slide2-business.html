<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #F8FAFC; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #0F172A; padding: 12pt 30pt;
  border-bottom: 4pt solid #0369A1;
}
.header h1 {
  color: #ffffff; font-size: 22pt;
  font-weight: bold; margin: 0;
}
.content {
  flex: 1; padding: 12pt 30pt 36pt;
}
.business-item {
  background: #ffffff; border: 2pt solid #E2E8F0;
  border-left: 4pt solid #0369A1;
  padding: 8pt 10pt; margin-bottom: 6pt;
}
.number-box {
  background: #0F172A;
  width: 26pt; height: 26pt;
  float: left;
}
.number {
  color: #ffffff; font-weight: bold;
  font-size: 12pt; line-height: 26pt;
  text-align: center;
}
.title {
  font-size: 13pt; font-weight: bold;
  color: #0F172A; margin: 0 0 4pt 32pt;
}
.meta {
  font-size: 9pt; color: #475569;
  line-height: 1.2; margin: 0 0 4pt 32pt;
}
.value-box {
  background: #0F172A;
  padding: 3pt 8pt;
  float: left;
  margin-left: 32pt;
}
.value {
  color: #ffffff; font-weight: bold;
  font-size: 9pt;
}
.clear { clear: both; }
</style>
</head>
<body>
<div class="header">
  <h1>三大业务方向</h1>
</div>
<div class="content">
  <div class="business-item">
    <div class="number-box"><p class="number">01</p></div>
    <p class="title">AI留守儿童父母陪伴人偶</p>
    <p class="meta">留守儿童（6-14岁）· 缓解分离孤独感</p>
    <div class="value-box"><p class="value">¥10亿+</p></div>
    <div class="clear"></div>
  </div>

  <div class="business-item">
    <div class="number-box"><p class="number">02</p></div>
    <p class="title">AI过世亲人纪念对话系统</p>
    <p class="meta">失去亲人的成年人 · 保留声音记忆</p>
    <div class="value-box"><p class="value">¥50亿+</p></div>
    <div class="clear"></div>
  </div>

  <div class="business-item">
    <div class="number-box"><p class="number">03</p></div>
    <p class="title">AI茶宠·商界名人智能对话</p>
    <p class="meta">创业者、企业主 · 商业咨询启发</p>
    <div class="value-box"><p class="value">¥20亿+</p></div>
    <div class="clear"></div>
  </div>
</div>
</body>
</html>
