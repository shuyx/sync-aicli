<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #F8FAFC; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #0F172A; padding: 12pt 30pt;
  border-bottom: 4pt solid #0369A1;
}
.header h1 {
  color: #ffffff; font-size: 22pt;
  font-weight: bold; margin: 0;
}
.content {
  flex: 1; padding: 10pt 30pt 36pt;
  display: flex; flex-wrap: wrap;
  gap: 12pt; align-content: flex-start;
}
.value-box {
  background: #ffffff; border: 2pt solid #E2E8F0;
  border-left: 4pt solid #0369A1;
  padding: 12pt; width: calc(50% - 6pt);
  box-sizing: border-box;
}
.value-number-bg {
  background: #0369A1;
  width: 32pt; height: 32pt;
  display: inline-block;
  margin-bottom: 8pt;
  text-align: center;
}
.value-number {
  color: #ffffff; font-weight: bold;
  font-size: 14pt; line-height: 32pt;
}
.value-title {
  font-size: 13pt; font-weight: bold;
  color: #0F172A; margin-bottom: 6pt;
}
.value-desc {
  font-size: 9pt; color: #475569;
  line-height: 1.3;
}
</style>
</head>
<body>
<div class="header">
  <h1>核心价值点</h1>
</div>
<div class="content">
  <div class="value-box">
    <div class="value-number-bg">
      <p class="value-number">01</p>
    </div>
    <p class="value-title">社会刚需</p>
    <p class="value-desc">服务留守儿童902万、失亲人群、创业者的情感陪伴需求</p>
  </div>

  <div class="value-box">
    <div class="value-number-bg">
      <p class="value-number">02</p>
    </div>
    <p class="value-title">技术创新</p>
    <p class="value-desc">多模态融合创造"有温度的科技产品"</p>
  </div>

  <div class="value-box">
    <div class="value-number-bg">
      <p class="value-number">03</p>
    </div>
    <p class="value-title">市场潜力</p>
    <p class="value-desc">三大细分市场总规模超80亿</p>
  </div>

  <div class="value-box">
    <div class="value-number-bg">
      <p class="value-number">04</p>
    </div>
    <p class="value-title">差异化竞争</p>
    <p class="value-desc">实体形象 + 个性化记忆 + 主动交互</p>
  </div>
</div>
</body>
</html>
